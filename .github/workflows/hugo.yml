name: Build and Release Hugo site

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [library-release]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "build"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # The DSL step catalog is the most important part of this site. We pull it
      # straight from the latest raccoon-lib release and FAIL HARD if it is
      # missing or empty — the site must never deploy without the step index.
      # No local fallback / regeneration: the library release is the single
      # source of truth, so a broken release surfaces here instead of silently
      # shipping an empty catalog.
      - name: Fetch DSL step catalog (required)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          mkdir -p data
          rm -f data/dsl_steps.json

          # Preferred: the standalone catalog asset attached to the release.
          gh release download --repo htl-stp-ecer/raccoon-lib \
            --pattern 'dsl-steps.json' \
            --dir /tmp/catalog || true

          if [ -f /tmp/catalog/dsl-steps.json ]; then
            cp /tmp/catalog/dsl-steps.json data/dsl_steps.json
          else
            echo "::error::Latest raccoon-lib release has no dsl-steps.json asset — cannot build docs without the step catalog."
            exit 1
          fi

          STEP_COUNT=$(jq 'length' data/dsl_steps.json)
          if [ "${STEP_COUNT}" -lt 1 ]; then
            echo "::error::DSL step catalog is empty (${STEP_COUNT} steps) — refusing to build the docs site."
            exit 1
          fi
          echo "DSL catalog: ${STEP_COUNT} steps"

      # API reference (Sphinx autoapi + Doxygen) the catalog cards link to.
      # Best-effort: a missing /api bundle degrades deep links but must not block
      # the build, since the step catalog above is the critical artifact.
      - name: Fetch library API reference
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          mkdir -p static/api
          if gh release download --repo htl-stp-ecer/raccoon-lib \
               --pattern 'raccoon-docs-*.zip' \
               --dir /tmp/api-docs; then
            ZIP=$(ls /tmp/api-docs/raccoon-docs-*.zip | head -1)
            echo "Extracting $ZIP into static/api/"
            unzip -o "$ZIP" -d static/api/
          else
            echo "::warning::No raccoon-docs-*.zip asset on the latest release — /api reference will be missing."
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Clean previous build
        run: rm -rf public

      - name: Build
        run: hugo --minify --cleanDestinationDir

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=raccoon-docs

      - name: Package site
        run: tar -czf documentation-site.tar.gz -C public .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: "Documentation Build #${{ github.run_id }}"
          body: |
            ## Documentation Site Build

            **Run ID:** `${{ github.run_id }}`
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### How to view locally

            1. Download `documentation-site.tar.gz` from the assets below
            2. Extract it:
               ```bash
               mkdir docs-site && tar -xzf documentation-site.tar.gz -C docs-site
               ```
            3. Serve it with any static file server, e.g.:
               ```bash
               cd docs-site
               python3 -m http.server 8080
               ```
               or
               ```bash
               npx serve docs-site
               ```
            4. Open http://localhost:8080 in your browser
          files: documentation-site.tar.gz
