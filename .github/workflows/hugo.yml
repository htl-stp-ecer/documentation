name: Build and Release Hugo site

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [library-release]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "build"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch library API docs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Download the latest docs zip from raccoon-lib releases
          mkdir -p static/api
          gh release download --repo htl-stp-ecer/raccoon-lib \
            --pattern 'raccoon-docs-*.zip' \
            --dir /tmp/api-docs || { echo "No docs release found, skipping"; exit 0; }

          ZIP=$(ls /tmp/api-docs/raccoon-docs-*.zip | head -1)
          echo "Extracting $ZIP into static/api/"
          unzip -o "$ZIP" -d static/api/

          # Place DSL catalog where Hugo can use it as data
          mkdir -p data
          if [ -f static/api/dsl-steps.json ]; then
            cp static/api/dsl-steps.json data/dsl_steps.json
            echo "DSL catalog: $(jq length data/dsl_steps.json) steps"
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Clean previous build
        run: rm -rf public

      - name: Build
        run: hugo --minify --cleanDestinationDir

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=raccoon-docs

      - name: Package site
        run: tar -czf documentation-site.tar.gz -C public .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: "Documentation Build #${{ github.run_id }}"
          body: |
            ## Documentation Site Build

            **Run ID:** `${{ github.run_id }}`
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### How to view locally

            1. Download `documentation-site.tar.gz` from the assets below
            2. Extract it:
               ```bash
               mkdir docs-site && tar -xzf documentation-site.tar.gz -C docs-site
               ```
            3. Serve it with any static file server, e.g.:
               ```bash
               cd docs-site
               python3 -m http.server 8080
               ```
               or
               ```bash
               npx serve docs-site
               ```
            4. Open http://localhost:8080 in your browser
          files: documentation-site.tar.gz
