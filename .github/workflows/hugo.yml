name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [library-release]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch library API docs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Download the latest docs zip from raccoon-lib releases
          mkdir -p static/api
          gh release download --repo htl-stp-ecer/raccoon-lib \
            --pattern 'libstp-docs-*.zip' \
            --dir /tmp/api-docs || { echo "No docs release found, skipping"; exit 0; }

          ZIP=$(ls /tmp/api-docs/libstp-docs-*.zip | head -1)
          echo "Extracting $ZIP into static/api/"
          unzip -o "$ZIP" -d static/api/

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
