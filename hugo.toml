baseURL = '/'
languageCode = 'en-us'
title = 'Raccoon Wiki'

[outputFormats]
  [outputFormats.llmstxt]
    name = "llmstxt"
    mediaType = "text/plain"
    path = ""
    baseName = "llms"
    isPlainText = true
    notAlternative = true

  [outputFormats.llmstxtfull]
    name = "llmstxtfull"
    mediaType = "text/plain"
    path = ""
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "JSON", "llmstxt", "llmstxtfull"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$']]
          inline = [['$', '$']]
