<aside class="sidebar">
    <div class="sidebar-content">
        <nav class="sidebar-nav">
            <div class="nav-section">
                <a href="/" class="nav-item{{ if .IsHome }} active{{ end }}">
                    <span class="nav-text">Home</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Documentation</div>

                {{ $currentPage := . }}
                {{ $home := .Site.Home }}
                {{ range sort $home.Sections ".File.Path" }}
                    <div class="nav-folder{{ if $currentPage.IsDescendant . }} expanded{{ end }}">
                        <div class="nav-folder-header">
                            <a href="{{ .Permalink }}" class="nav-folder-link{{ if eq $currentPage.Permalink .Permalink }} active{{ end }}">
                                {{ .Title }}
                            </a>
                            {{ if .Pages }}
                            <button class="folder-toggle" aria-label="Toggle folder">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                    <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            {{ end }}
                        </div>
                        {{ if .Pages }}
                        <ul class="nav-folder-items">
                            {{ range sort .Pages ".File.Path" }}
                            <li>
                                <a href="{{ .Permalink }}" class="nav-item{{ if eq $currentPage.Permalink .Permalink }} active{{ end }}">
                                    <span class="nav-text">{{ .Title }}</span>
                                </a>
                            </li>
                            {{ end }}
                        </ul>
                        {{ end }}
                    </div>
                {{ end }}
            </div>
        </nav>
    </div>
</aside>
