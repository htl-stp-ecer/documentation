{{ define "main" }}
<div class="home-hero">
    <div class="hero-text">
        <div class="hero-eyebrow">raccoon-docs.pages.dev</div>
        <h1 class="hero-title">RaccoonOS</h1>
        <p class="hero-tagline">Open-Source Robotics Platform</p>
        <p class="hero-sub">Raise the floor, don't lower the ceiling.</p>
        <div class="hero-divider"></div>
        <a href="/00-quick-start/" class="hero-cta">Get Started →</a>
    </div>
    <div class="hero-raccoon" aria-hidden="true">
        <img src="/images/raccoon.svg" alt="" class="raccoon-img">
    </div>
</div>

<div class="doc-content">
    <div class="doc-body markdown home-body">
        {{ .Content }}
    </div>
</div>
{{ end }}
